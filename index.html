<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Fayyaza Putri Dhiera</title>
  <style>
    :root {
      --pink: #ff5fa2;
      --soft-pink: #ffd1e6;
      --yellow: #ffe88b;
      --purple: #b98cff;
      --blue: #8ed8ff;
      --mint: #9ff7d1;
      --cream: #fffaf3;
      --text: #7a2451;
      --text-soft: #975276;
      --shadow: rgba(179, 72, 117, 0.14);
      --card: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff7a8 0%, transparent 26%),
        radial-gradient(circle at top right, #ffd0f0 0%, transparent 24%),
        radial-gradient(circle at bottom left, #b7f4ff 0%, transparent 25%),
        linear-gradient(180deg, #ffb7da 0%, #ffd8ea 20%, #ffeec8 45%, #d8f8ff 70%, #e8dcff 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 1px, transparent 1.7px),
        radial-gradient(circle, rgba(255, 95, 162, 0.18) 1px, transparent 1.6px);
      background-size: 140px 140px, 200px 200px;
      background-position: 0 0, 60px 40px;
      opacity: 0.6;
      animation: twinkle 8s linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.82; }
    }

    .petal-layer,
    .balloon-layer,
    .sparkle-transition-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .sparkle-transition-layer {
      z-index: 60;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .sparkle-transition-layer.active {
      opacity: 1;
    }

    .sparkle-dot {
      position: absolute;
      left: 50%;
      top: 55%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4);
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--spark-color, #ff9ec4) 65%, rgba(255,255,255,0.1) 100%);
      box-shadow: 0 0 18px rgba(255,255,255,0.7), 0 0 28px rgba(255, 158, 196, 0.35);
      animation: sparkleBurst var(--duration, 1.8s) ease-out forwards;
      will-change: transform, opacity;
    }

    .sparkle-dot.star {
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      border-radius: 0;
    }

    @keyframes sparkleBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(0, 0) scale(0.35) rotate(0deg);
      }
      8% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--tx, 0px), var(--ty, -320px)) scale(var(--scale, 1.1)) rotate(var(--rot, 0deg));
      }
    }

    .petal,
    .memory-balloon {
      position: absolute;
      bottom: -12vh;
      animation: floatUp linear infinite;
      opacity: 0.85;
    }

    .petal {
      filter: blur(0.2px) drop-shadow(0 10px 14px rgba(255, 95, 162, 0.18));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      12% { opacity: 0.95; }
      100% {
        transform: translateY(-125vh) rotate(24deg) scale(1.18);
        opacity: 0;
      }
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.98), rgba(255, 214, 231, 0.95) 38%, rgba(255, 238, 245, 0.96) 100%);
      padding: 20px;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .intro-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .intro-card {
      width: min(760px, 100%);
      min-height: 430px;
      padding: 36px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 28px 70px rgba(179, 72, 117, 0.18);
      backdrop-filter: blur(16px);
      text-align: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .intro-card::before,
    .intro-card::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.65;
      z-index: -1;
    }

    .intro-card::before {
      background: rgba(255, 143, 190, 0.42);
      top: -70px;
      left: -50px;
    }

    .intro-card::after {
      background: rgba(255, 255, 255, 0.85);
      bottom: -70px;
      right: -40px;
    }

    .intro-crown {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-4deg) translateY(-3px); }
      75% { transform: rotate(4deg) translateY(3px); }
    }

    .intro-title {
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 1.08;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ff5fa2, #ff8ebe, #ffcf5c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro-subtitle {
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.85;
      color: var(--text-soft);
      font-size: 1.03rem;
    }

    .intro-question {
      margin-top: 26px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .intro-actions {
      position: relative;
      width: min(520px, 100%);
      height: 130px;
      margin: 22px auto 0;
    }

    .bubble-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      position: absolute;
      user-select: none;
      box-shadow: 0 14px 30px rgba(255, 95, 162, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .bubble-yes {
      left: 50%;
      top: 18px;
      transform: translateX(-145px);
      color: white;
      background: linear-gradient(135deg, #ff5fa2, #ff8ebe, #ffb74d);
      cursor: pointer;
    }

    .bubble-yes:hover {
      transform: translateX(-145px);
      box-shadow: 0 18px 34px rgba(255, 95, 162, 0.22);
    }

    .bubble-no {
      left: 50%;
      top: 18px;
      transform: translateX(22px);
      color: var(--pink);
      background: rgba(255, 255, 255, 0.96);
      cursor: not-allowed;
    }

    .main-page {
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
    }

    .main-page.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .wrap {
      width: min(1120px, 92%);
      margin: 0 auto;
      padding: 24px 0 84px;
    }

    .sound-topbar {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .sound-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 24px rgba(255, 95, 162, 0.14);
      backdrop-filter: blur(12px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .sound-pill span {
      font-weight: 700;
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    .sound-btn {
      border: none;
      border-radius: 999px;
      padding: 9px 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ff5fa2, #ff8ebe, #ffb74d);
      color: white;
      box-shadow: 0 10px 18px rgba(255, 95, 162, 0.18);
      transition: transform 0.2s ease;
    }

    .sound-btn:hover {
      transform: translateY(-1px);
    }

    .hero {
      min-height: 88vh;
      display: grid;
      place-items: center;
      padding-top: 10px;
    }

    .hero-box,
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 54px var(--shadow);
    }

    .hero-box {
      width: 100%;
      padding: 40px 28px;
      text-align: center;
      animation: gentleFloat 4.6s ease-in-out infinite;
    }

    .hero-box::before,
    .panel::before {
      content: "";
      position: absolute;
      inset: auto auto -60px -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0) 70%);
      pointer-events: none;
    }

    .hero-box::after,
    .panel::after {
      content: "";
      position: absolute;
      top: -70px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(177, 164, 255, 0.28), rgba(177, 164, 255, 0) 72%);
      pointer-events: none;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      font-weight: 700;
      color: var(--pink);
      box-shadow: 0 10px 22px rgba(255, 95, 162, 0.12);
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.6rem, 5vw, 5rem);
      line-height: 1.08;
      margin-bottom: 14px;
    }

    .gradient-name {
      background: linear-gradient(135deg, #ff4d88, #ff8c4d, #ffcc4d, #b66dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-copy {
      max-width: 770px;
      margin: 0 auto;
      line-height: 1.95;
      color: var(--text-soft);
      font-size: clamp(1rem, 2vw, 1.16rem);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 24px;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 13px 20px;
      font-weight: 700;
      transition: 0.25s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #ff5fa2, #ff8ebe, #ffb74d);
      box-shadow: 0 14px 26px rgba(255, 95, 162, 0.2);
    }

    .btn-soft {
      color: var(--pink);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(255, 95, 162, 0.12);
    }

    .flower-row {
      margin-top: 20px;
      font-size: 1.9rem;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      animation: bloom 3.2s ease-in-out infinite;
    }

    @keyframes bloom {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .panel {
      margin-top: 28px;
      padding: 30px 28px;
    }

    .section-title {
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      margin-bottom: 10px;
    }

    .section-sub {
      color: var(--text-soft);
      line-height: 1.82;
      margin-bottom: 18px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
    }

    .mini-card {
      border-radius: 26px;
      padding: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 247, 251, 0.9));
      box-shadow: 0 16px 28px rgba(179, 72, 117, 0.1);
      transition: 0.25s ease;
    }

    .mini-card:hover {
      transform: translateY(-4px) rotate(-1deg);
    }

    .mini-card .emoji {
      font-size: 2rem;
      display: inline-block;
      margin-bottom: 12px;
      animation: wiggle 2.2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      30% { transform: rotate(-8deg); }
      70% { transform: rotate(8deg); }
    }

    .mini-card h3 {
      margin-bottom: 10px;
    }

    .mini-card p,
    .letter p,
    .wish-card p,
    .memory-title,
    .memory-note,
    .vinyl-meta,
    .footer,
    .quote-box p {
      line-height: 1.88;
      color: var(--text-soft);
    }

    .letter {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 245, 249, 0.9));
      border-left: 8px solid #ff8dc0;
    }

    .letter p + p {
      margin-top: 14px;
    }

    .music-grid {
      display: grid;
      grid-template-columns: minmax(260px, 330px) 1fr;
      gap: 26px;
      align-items: center;
    }

    .vinyl-card {
      position: relative;
      min-height: 330px;
      border-radius: 30px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 236, 245, 0.9));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.9), 0 16px 30px rgba(179, 72, 117, 0.1);
      display: grid;
      place-items: center;
    }

    .turntable {
      position: relative;
      width: 250px;
      height: 250px;
      border-radius: 28px;
      background: linear-gradient(145deg, #fffefe, #ffeaf4);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.9), 0 18px 34px rgba(179, 72, 117, 0.12);
      display: grid;
      place-items: center;
    }

    .vinyl {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #ffffff 0 11%, #ffd8e8 12% 20%, #2a2247 21% 30%, #111111 31% 44%, #1a1a1a 45% 56%, #0f0f0f 57% 68%, #1a1a1a 69% 80%, #101010 81% 100%);
      box-shadow: 0 20px 30px rgba(28, 19, 64, 0.22);
      position: relative;
    }

    .vinyl::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .vinyl-label {
      position: absolute;
      inset: 50%;
      width: 76px;
      height: 76px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, #ffc7dc 55%, #ff77af 100%);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 8px 18px rgba(255, 95, 162, 0.25);
      color: #7a2451;
      z-index: 2;
    }

    .vinyl-label strong {
      display: block;
      font-size: 0.67rem;
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    .vinyl-label span {
      display: block;
      font-size: 0.56rem;
      line-height: 1.08;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    .turntable.playing .vinyl {
      animation: spin 3.4s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .tonearm {
      position: absolute;
      width: 88px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd1e6, #ff8ebe);
      top: 55px;
      right: 28px;
      transform-origin: 6px 50%;
      transform: rotate(-18deg);
      transition: transform 0.4s ease;
      box-shadow: 0 8px 18px rgba(80, 60, 152, 0.15);
    }

    .tonearm::after {
      content: "";
      position: absolute;
      right: -2px;
      top: -5px;
      width: 14px;
      height: 20px;
      border-radius: 8px;
      background: #ff6fa6;
    }

    .turntable.playing .tonearm {
      transform: rotate(12deg);
    }

    .song-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--pink);
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(179, 72, 117, 0.1);
      margin-bottom: 14px;
    }

    .wish-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
    }

    .wish-card,
    .quote-box,
    .memory-outer {
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(243, 239, 255, 0.9));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.92), 0 14px 28px rgba(98, 81, 165, 0.1);
      padding: 24px;
    }

    .wish-form {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .wish-form input,
    .wish-form textarea {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 15px 16px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(155, 135, 255, 0.18);
      font-size: 0.98rem;
    }

    .wish-form textarea {
      min-height: 150px;
      resize: vertical;
    }

    .quote-box {
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 240, 246, 0.95));
    }

    .quote-box p {
      font-size: clamp(1.1rem, 2vw, 1.38rem);
      font-style: italic;
      color: #9a4e75;
    }

    .memories-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .memory-outer {
      position: relative;
      overflow: hidden;
    }

    .memory-stage {
      position: relative;
      min-height: 520px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 255, 255, 0.8) 0 8%, transparent 9%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.8) 0 8%, transparent 9%),
        linear-gradient(180deg, #ffe4ef 0%, #fffaf3 100%);
      filter: blur(18px) saturate(0.9);
      transform: scale(1.02);
      transition: filter 0.9s ease, transform 0.9s ease, opacity 0.9s ease;
      opacity: 0.84;
    }

    .memory-stage.revealed {
      filter: blur(0);
      transform: scale(1);
      opacity: 1;
    }

    .memory-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      z-index: 3;
      background: rgba(255, 255, 255, 0.28);
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .memory-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .polaroid-grid {
      position: relative;
      min-height:
